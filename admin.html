<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Baggage System Admin</title>
    <style>
        body { font-family: sans-serif; background: #ececec; padding: 40px; }
        .admin-container { 
            max-width: 600px; margin: auto; background: white; 
            padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }
        button { 
            width: 100%; padding: 15px; background: #007bff; color: white; 
            border: none; border-radius: 6px; font-size: 18px; cursor: pointer; 
            font-weight: bold; transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="admin-container">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #007bff; margin-bottom: 20px;">
        <h2 style="border: none; margin: 0;">수하물 전광판 원격 제어</h2>
        <a href="index.html" style="text-decoration: none; background: #666; color: white; padding: 8px 15px; border-radius: 5px; font-size: 14px;">전광판 보기 🖥️</a>
    </div>
    <div class="form-group">
        <label>항공사 선택 (Airline)</label>
        <select id="airline_logo">
            <option value="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQgcE_PhFtsVRcCBSQKsYCBe0XBHr4tABZL2g&s">대한항공 (Korean Air)</option>
            <option value="https://i.postimg.cc/GmMTFBWN/아시아나_스얼로고.png">아시아나 항공 (Asiana)</option>
            <option value="https://i.namu.wiki/i/RQHfSYS_tuzubR63Mq1HP-evf61ES02kF9S9kTAXKal7gx2NnxOxkZ1RTR6Lbez2OCOfG2rTNc0AgMkSRWUQNA.svg">제주항공 (Jeju Air)</option>
            <option value="https://i.namu.wiki/i/X7WhsGd1WgdyOL_zRh5tGITxOF-YCESs2Fk4EL3C6cNQhLcj2NOuXjJ3SnmrnTsygbWhXoOx97YCmCiq_T-XUA.webp">진에어 (Jin Air)</option>
            <option value="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRfUjna4qOrkJAsVrYZo-5o_Iv31XtCMmVwIw&s">티웨이 항공 (T'way)</option>
        </select>
    </div>

    <div class="form-group">
        <label>출발지 (Origin)</label>
        <input type="text" id="origin" value="JEJU">
    </div>
    <div class="form-group">
        <label>편명 (Flight No)</label>
        <input type="text" id="flight_no" value="KE 1250">
    </div>
    <div class="form-group">
        <label>벨트 번호 (Belt No)</label>
        <input type="text" id="belt_no" value="1">
    </div>
    <div class="form-group">
        <label>상태 - 한국어 (Status KO)</label>
        <input type="text" id="status_ko" value="수하물 처리중">
    </div>
    <div class="form-group">
        <label>상태 - 영어 (Status EN)</label>
        <input type="text" id="status_en" value="Now Loading">
    </div>
    <div class="form-group">
        <label>유튜브 영상 ID (CCTV)</label>
        <input type="text" id="youtube_id" placeholder="예: dQw4w9WgXcQ">
    </div>
    <div class="form-group">
        <label>하단 흐르는 자막 (Announcement)</label>
        <input type="text" id="marquee" value="즐거운 여행 되십시오.">
    </div>
    <button id="update-btn">화면으로 즉시 전송</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyuJDE755VS_kebUr7U9LAP34XVEM4qpM",
        authDomain: "baggage-claim-system.firebaseapp.com",
        databaseURL: "https://baggage-claim-system-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "baggage-claim-system",
        storageBucket: "baggage-claim-system.firebasestorage.app",
        messagingSenderId: "512539951611",
        appId: "1:512539951611:web:5a36dbdaf27c2618334b5e",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById('update-btn').onclick = function() {
        // 모든 입력값과 선택된 로고 주소를 객체로 만듭니다.
        const data = {
            origin: document.getElementById('origin').value,
            flight_no: document.getElementById('flight_no').value,
            belt_no: document.getElementById('belt_no').value,
            status_ko: document.getElementById('status_ko').value,
            status_en: document.getElementById('status_en').value,
            youtube_id: document.getElementById('youtube_id').value,
            marquee: document.getElementById('marquee').value,
            // [추가됨] 드롭다운에서 선택한 이미지 주소 저장
            airline_url: document.getElementById('airline_logo').value
        };

        set(ref(db, 'baggage_system'), data)
            .then(() => alert("전광판이 실시간으로 업데이트되었습니다!"))
            .catch((error) => alert("에러 발생: " + error.message));
    };
</script>
</body>
</html>
